<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
    <title>幼儿象形识字配对完整版小游戏</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body{
            background-color: #fff3e9;
            padding: 20px 12px;
        }
        header{
            text-align: center;
            margin-bottom: 24px;
        }
        h1{
            color:#d82626;
            font-size: 26px;
        }
        .tip-text{
            margin-top:8px;
            color:#666;
        }
        .game-container{
            max-width: 720px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            padding:22px;
            box-shadow: 0 4px 14px #0000001a;
        }
        /* 单行配对布局：汉字 | 符号 | 插画 横向并排 */
        .pair-row{
            display:flex;
            align-items:center;
            justify-content: space-between;
            margin: 20px 0;
            gap:16px;
            width:100%;
        }
        .char-item{
            width:30%;
        }
        .sign-item{
            width:10%;
            text-align:center;
        }
        .img-item{
            width:30%;
        }
        .q-mark{
            font-size:44px;
            font-weight:bold;
        }
        .q-default{ color:#d82626; }
        .q-right{ color:#179b43; }
        .q-wrong{ color:#d62424; }
        .char-card{
            background:#e62727;
            color:white;
            font-size:46px;
            text-align:center;
            padding:14px 0;
            border-radius:12px;
            cursor:grab;
            user-select:none;
            border:3px solid transparent;
        }
        .char-card.dragging{
            opacity:0.6;
            border:3px solid #ffdd00;
        }
        .img-card{
            border:2px solid #e62727;
            border-radius:12px;
            padding:10px;
            min-height: 110px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#fff8f8;
        }
        .img-card.highlight{
            border:3px solid #ffdd00;
        }
        .svg-pic{
            width:90px;
            height:90px;
            display:block;
        }
        .control-area{
            margin-top: 28px;
            display:flex;
            justify-content:center;
        }
        button{
            padding: 10px 22px;
            font-size:17px;
            border:none;
            border-radius:10px;
            background:#e62727;
            color:white;
            cursor:pointer;
        }
        button:hover{
            background:#c01e1e;
        }
        .result-panel{
            text-align:center;
            margin-top:18px;
            font-size:20px;
            font-weight:bold;
            min-height: 28px;
        }
        .right{color:#179b43}
        .wrong{color:#d62424}
        .guide-tip{
            max-width:720px;
            margin:30px auto 0;
            background:#fff8e0;
            padding:16px;
            border-radius:14px;
            border:1px solid #ffdd77;
        }
        .guide-tip h3{
            color:#e69500;
            margin-bottom:8px;
            font-size:16px;
        }
        .guide-tip p{
            color:#555;
            line-height:1.6;
            font-size:14px;
        }
        .footer-copyright{
            text-align:center;
            margin-top:36px;
            font-size:13px;
            color:#999;
        }
        /*手机端适配缩小尺寸*/
        @media(max-width:520px){
            .char-card{font-size:34px}
            .q-mark{font-size:34px}
            .svg-pic{width:70px;height:70px}
        }
    </style>
</head>
<body>
<header>
    <h1>象形识字配对完整版小游戏</h1>
    <div class="tip-text">拖动左侧汉字放到同一行图片上，匹配成功显示绿色对勾</div>
</header>
<div class="game-container" id="gameWrap">
    <!-- 仅生成3行配对：每行 汉字 | ? | 形象插画 -->
</div>
<div class="control-area">
    <button onclick="refreshLevel()">换一组题目</button>
</div>
<div class="result-panel" id="resultHint"></div>

<div class="guide-tip">
    <h3>💡识字小建议</h3>
    <p>识字顺序：生活常用字→数字→人称家人→动作汉字→自然景物，结合实物、绘本场景认读，不要死记硬背；每日少量多次练习，搭配图形加深记忆。</p>
</div>

<div class="footer-copyright">
    provided by 光明小月
</div>

<script>
// 完整常用字题库
const wordBank = [
    {word:"一",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#e8f4ff" rx="10"/><line x1="15" y1="50" x2="85" y2="50" stroke="#3377dd" stroke-width="8" stroke-linecap="round"/></svg>`},
    {word:"二",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#e8f4ff" rx="10"/><line x1="18" y1="35" x2="82" y2="35" stroke="#3377dd" stroke-width="7" stroke-linecap="round"/><line x1="12" y1="62" x2="88" y2="62" stroke="#3377dd" stroke-width="7" stroke-linecap="round"/></svg>`},
    {word:"三",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#e8f4ff" rx="10"/><line x1="20" y1="28" x2="80" y2="28" stroke="#3377dd" stroke-width="6" stroke-linecap="round"/><line x1="15" y1="50" x2="85" y2="50" stroke="#3377dd" stroke-width="6" stroke-linecap="round"/><line x1="10" y1="72" x2="90" y2="72" stroke="#3377dd" stroke-width="6" stroke-linecap="round"/></svg>`},
    {word:"十",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#e8f4ff" rx="10"/><line x1="50" y1="15" x2="50" y2="85" stroke="#3377dd" stroke-width="7"/><line x1="20" y1="50" x2="80" y2="50" stroke="#3377dd" stroke-width="7"/></svg>`},
    {word:"零",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f0f8ff" rx="10"/><circle cx="50" cy="50" r="30" fill="none" stroke="#2277cc" stroke-width="7"/></svg>`},
    {word:"人",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#fff3e6" rx="10"/><circle cx="50" cy="22" r="14" fill="#ffddbb"/><circle cx="44" cy="18" r="2" fill="#333"/><circle cx="56" cy="18" r="2" fill="#333"/><path d="M44 26 Q50 32 56 26" fill="none" stroke="#333" stroke-width="2"/><line x1="50" y1="36" x2="50" y2="62" stroke="#333" stroke-width="5"/><line x1="50" y1="42" x2="26" y2="58" stroke="#333" stroke-width="5"/><line x1="50" y1="42" x2="74" y2="58" stroke="#333" stroke-width="5"/><line x1="50" y1="62" x2="34" y2="88" stroke="#333" stroke-width="5"/><line x1="50" y1="62" x2="66" y2="88" stroke="#333" stroke-width="5"/><path d="M42 40 L58 40 L54 52 L46 52 Z" fill="#ffcc22"/><path d="M44 52 L56 52 L52 64 L48 64 Z" fill="#3377dd"/></svg>`},
    {word:"日",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#b8e4ff" rx="10"/><circle cx="50" cy="50" r="24" fill="#ffcc00"/><circle cx="50" cy="50" r="16" fill="#ff9900"/><line x1="50" y1="8" x2="50" y2="16" stroke="#ffcc00" stroke-width="4"/><line x1="50" y1="84" x2="50" y2="92" stroke="#ffcc00" stroke-width="4"/><line x1="8" y1="50" x2="16" y2="50" stroke="#ffcc00" stroke-width="4"/><line x1="84" y1="50" x2="92" y2="50" stroke="#ffcc00" stroke-width="4"/><ellipse cx="42" cy="50" rx="8" ry="6" fill="#222"/><ellipse cx="58" cy="50" rx="8" ry="6" fill="#222"/></svg>`},
    {word:"月",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#1a2440" rx="10"/><ellipse cx="32" cy="72" rx="22" ry="12" fill="#f0f4ff" opacity="0.85"/><ellipse cx="20" cy="70" rx="14" ry="9" fill="#f0f4ff" opacity="0.85"/><ellipse cx="44" cy="70" rx="16" ry="10" fill="#f0f4ff" opacity="0.85"/><ellipse cx="76" cy="78" rx="16" ry="9" fill="#f0f4ff" opacity="0.75"/><ellipse cx="66" cy="76" rx="10" ry="6" fill="#f0f4ff" opacity="0.75"/><path d="M66 20 A28 28 0 1 1 66 80 A16 16 0 1 0 66 20" fill="#ffdd88" stroke="#ffbb44" stroke-width="2"/><text x="22" y="32" font-size="18" fill="#fff7aa">★</text><text x="14" y="48" font-size="10" fill="#fff7aa">✦</text><text x="80" y="42" font-size="14" fill="#fff7aa">★</text><text x="34" y="82" font-size="12" fill="#fff7aa">✦</text><text x="86" y="68" font-size="9" fill="#fff7aa">✦</text></svg>`},
    {word:"山",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#d6f0f8" rx="10"/><polygon points="20,82 40,46 60,82" fill="#69a878"/><polygon points="40,82 60,24 80,82" fill="#ffb366"/><polygon points="60,82 80,46 96,82" fill="#7bb8b8"/><polygon points="40,46 48,36 54,48" fill="#ffffff" opacity="0.75"/><polygon points="60,24 68,14 74,28" fill="#ffffff" opacity="0.75"/><rect x="10" y="82" width="80" height="12" fill="#72c472"/></svg>`},
    {word:"火",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f0f0f0" rx="10"/><path d="M30 86 Q50 56 70 86 Z" fill="#dd3322"/><path d="M38 76 Q50 46 62 76 Z" fill="#ffaa22"/><path d="M44 66 Q50 38 56 66 Z" fill="#ffee44"/><rect x="32" y="84" width="36" height="8" fill="#885533" rx="2"/><rect x="40" y="80" width="24" height="6" fill="#996644" rx="2"/></svg>`},
    {word:"伞",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#e6f2ff" rx="10"/><path d="M10 44 Q50 10 90 44" fill="#3388dd"/><path d="M10 44 Q50 10 90 44" fill="none" stroke="#1155aa" stroke-width="2"/><line x1="50" y1="44" x2="28" y2="62" stroke="#ffffff" stroke-width="2" opacity="0.7"/><line x1="50" y1="44" x2="72" y2="62" stroke="#ffffff" stroke-width="2" opacity="0.7"/><line x1="50" y1="44" x2="16" y2="54" stroke="#ffffff" stroke-width="2" opacity="0.7"/><line x1="50" y1="44" x2="84" y2="54" stroke="#ffffff" stroke-width="2" opacity="0.7"/><line x1="50" y1="44" x2="50" y2="86" stroke="#663322" stroke-width="4"/><path d="M42 86 Q50 92 58 86" fill="none" stroke="#663322" stroke-width="3"/></svg>`},
    {word:"口",svg:`<svg class="svg-pic" viewBox="0 0 100 100"><rect width="100" height="100" fill="#fff0f0" rx="10"/><ellipse cx="50" cy="50" rx="32" ry="22" fill="#ff8888" stroke="#dd4444" stroke-width="3"/></svg>`}
];

let dragItem = null;

// 数组洗牌函数
function shuffle(arr){
    const copy = [...arr];
    for(let i=copy.length-1;i>0;i--){
        const rnd = Math.floor(Math.random()*(i+1));
        [copy[i],copy[rnd]] = [copy[rnd],copy[i]];
    }
    return copy;
}

// 刷新题目：固定只取3组，汉字和图片分别乱序错位
function refreshLevel(){
    const hintDom = document.getElementById("resultHint");
    hintDom.innerText = "";
    const wrap = document.getElementById("gameWrap");
    wrap.innerHTML = "";

    // 随机抽取3个不重复生字
    const shuffledAll = shuffle(wordBank);
    const group = shuffledAll.slice(0,3);
    // 汉字数组、图片数组分开打乱，实现错位乱序
    const charList = shuffle([...group]);
    const imgList = shuffle([...group]);

    // 循环生成3行
    for(let i=0;i<3;i++){
        const charData = charList[i];
        const imgData = imgList[i];
        const row = document.createElement("div");
        row.className = "pair-row";
        row.dataset.index = i;
        row.innerHTML = `
            <div class="char-item">
                <div class="char-card" draggable="true" data-word="${charData.word}">${charData.word}</div>
            </div>
            <div class="sign-item">
                <div class="q-mark q-default">?</div>
            </div>
            <div class="img-item">
                <div class="img-card" data-match="${imgData.word}" data-row="${i}">
                    ${imgData.svg}
                </div>
            </div>
        `;
        wrap.appendChild(row);
    }
    bindDragEvent();
}

// 绑定拖拽事件
function bindDragEvent(){
    const allCharCards = document.querySelectorAll(".char-card");
    const allImgCards = document.querySelectorAll(".img-card");

    allCharCards.forEach(card=>{
        card.ondragstart = function(e){
            dragItem = this;
            this.classList.add("dragging");
            e.dataTransfer.setData("text", this.dataset.word);
        }
        card.ondragend = function(){
            dragItem = null;
            this.classList.remove("dragging");
            allImgCards.forEach(img=>img.classList.remove("highlight"));
        }
    })

    allImgCards.forEach(img=>{
        img.ondragover = function(e){
            e.preventDefault();
            allImgCards.forEach(i=>i.classList.remove("highlight"));
            this.classList.add("highlight");
        }
        img.ondrop = function(e){
            e.preventDefault();
            const dragWord = e.dataTransfer.getData("text");
            const targetWord = this.dataset.match;
            const rowIdx = this.dataset.row;
            const signDom = document.querySelector(`.pair-row[data-index="${rowIdx}"] .q-mark`);

            if(dragWord === targetWord){
                signDom.className = "q-mark q-right";
                signDom.textContent = "✅";
            }else{
                signDom.className = "q-mark q-wrong";
                signDom.textContent = "❌";
            }
            this.classList.remove("highlight");
            checkAllComplete();
        }
    })
}

// 检测三组全部完成配对
function checkAllComplete(){
    const signs = document.querySelectorAll(".q-mark");
    let allDone = true;
    let allRight = true;
    signs.forEach(s=>{
        if(s.innerText === "?") allDone = false;
        if(s.innerText !== "✅") allRight = false;
    });
    if(!allDone) return;
    const hintDom = document.getElementById("resultHint");
    if(allRight){
        hintDom.className = "result-panel right";
        hintDom.innerText = "🎉全部配对正确，太棒啦！";
    }else{
        hintDom.className = "result-panel wrong";
        hintDom.innerText = "❌有配对错误，重新拖动汉字试试吧！";
    }
}

// 页面加载自动渲染
window.onload = function(){
    refreshLevel();
}
</script>
</body>
</html>
