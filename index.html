    <style>

        body {

            margin-bottom: 20px;
            justify-content: center;
        }

            background: #409eff;
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            border: none;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-item.active {
            background: #ff6b8b;
            transform: scale(1.05);
        }

        .category-item:hover {
            opacity: 0.9;
        }

        /* 功能按钮区 */

            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .func-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            color: #fff;
            transition: 0.3s;
            box-shadow: 0 2px 8px #ccc;

        }

        .voice-btn {

        }

        .prev-btn {

        }

        .next-btn {

        }

        .func-btn:active {

            height: 320px;
            background: #fff;
            border-radius: 20px;

            box-shadow: 0 5px 20px #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;

            font-weight: bold;
            line-height: 1.2;
        }

        .char-pinyin {
            font-size: 28px;
            color: #409eff;
            margin-top: 10px;
            font-weight: 500;

            border-radius: 15px;

            color: #e6a23c;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;

            const item = showList[index];
            charEl.innerText = item.char;
            pinyinEl.innerText = item.pinyin;
            descEl.innerText = item.desc;
            progressEl.innerText = `当前：${index+1} / ${showList.length} 个汉字`;
        }

        //朗读文字
        function voiceRead(){
            const text = showList[index].char;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            speechSynthesis.speak(utter);
        }

        //切换分类
        categoryBtns.forEach(btn=>{
            btn.onclick = function(){
                categoryBtns.forEach(b=>b.classList.remove('active'));
                this.classList.add('active');
                currentType = Number(this.dataset.index);
                if(currentType === 0){
                    showList = totalList;
                }else{
                    showList = charAll[currentType-1];
                }
                index = 0;
                render();
            }
        })

        //上一个
        prevBtn.onclick = function(){
            if(index > 0) index--;
            render();
        }
        //下一个
        nextBtn.onclick = function(){
            if(index < showList.length-1) index++;
            render();
        }
        //朗读
        voiceBtn.onclick = voiceRead;
        //随机
        randomBtn.onclick = function(){
            index = Math.floor(Math.random() * showList.length);
            render();
        }
